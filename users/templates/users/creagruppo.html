{% extends "base.html" %}

{% block title %} Crea Djangroup {% endblock %}

{% block content %}

<div style="width: 350px; margin: 20px auto;">
    <h2>Crea un nuovo Djangroup</h2>

    <form method="post" enctype="multipart/form-data">{% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Crea Gruppo" style="background-color: rgba(0,255,0,0.4); cursor: pointer; font-size: 16px; width: 100%; font-weight: bold;">
    </form>
</div>

{% endblock %}
