{% extends "base.html" %}

{% block title %} Segnala {{ tipo }} {% endblock %}

{% block content %}

<div style="width: 350px; margin: 20px auto;">
    <h2>Segnala {{ tipo }}</h2>

    <p>Stai segnalando: <em>"{{ oggetto }}"</em></p>

    <form method="post">{% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Invia Segnalazione" style="background-color: rgba(255,0,0,0.3); cursor: pointer; font-weight: bold; border: none;">
    </form>
</div>

{% endblock %}
