{% extends "base.html" %}

{% block title %} Modifica Profilo {% endblock %}

{% block content %}

<div style="width: 350px; margin: 20px auto;">
    <h2>Modifica Profilo</h2>

    <form method="post" enctype="multipart/form-data">{% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Salva Modifiche" style="background-color: rgba(0,255,0,0.4); cursor: pointer; font-size: 16px; width: 100%; font-weight: bold;">
    </form>

    <br>
    <center><a href="{% url 'users:profilo' username=request.user.username %}" style="text-decoration: none;"><button type="button" style="background-color: rgba(24,119,242,0.2); cursor: pointer; font-weight: bold; font-size: 14px;">Torna al Profilo</button></a></center>
</div>

{% endblock %}
